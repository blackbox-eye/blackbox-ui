# ═══════════════════════════════════════════════════════════════
# Sprint 5 Smoke Test Workflow
# ═══════════════════════════════════════════════════════════════
#
# Kører endpoint-tests og Lighthouse audits for PR'er mod main.
# Triggeres kun ved relevante fil-ændringer.
#
# ═══════════════════════════════════════════════════════════════
---
name: Sprint 5 Smoke Test

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '.github/agents/**'
      - 'docs/**'
      - '**/*.md'

# Prevent multiple runs on same PR - auto-cancel old runs
concurrency:
  group: sprint5-smoke-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Minimal permissions for security
permissions:
  contents: read

jobs:
  smoke-test:
    name: "🧪 Smoke Test"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, json

      - name: Start PHP server
        run: |
          php -S localhost:8000 &
          sleep 2

      - name: Test endpoints
        run: |
          curl -f http://localhost:8000/index.php || exit 1
          curl -f http://localhost:8000/demo.php || exit 1
          curl -f http://localhost:8000/pricing.php || exit 1
          curl -f http://localhost:8000/free-scan.php || exit 1
          echo "✅ All pages load successfully"

      - name: Measure TTFB (performance threshold 300ms)
        run: |
          echo "📊 Measuring Time To First Byte (TTFB)..."
          THRESHOLD=300
          FAIL=0
          
          for ENDPOINT in "/" "/index.php" "/contact.php"; do
            TTFB_RAW=$(curl -w "%{time_starttransfer}" -o /dev/null -s "http://localhost:8000$ENDPOINT" 2>/dev/null)
            CURL_EXIT=$?
            
            if [ "$CURL_EXIT" -eq 0 ] && [ -n "$TTFB_RAW" ]; then
              TTFB_MS=$(echo "$TTFB_RAW" | awk '{printf "%.0f", $1 * 1000}')
              
              if [ "$TTFB_MS" -gt "$THRESHOLD" ]; then
                echo "⚠️  $ENDPOINT: ${TTFB_MS}ms (exceeds ${THRESHOLD}ms threshold)"
                FAIL=1
              else
                echo "✅ $ENDPOINT: ${TTFB_MS}ms"
              fi
            else
              echo "❌ $ENDPOINT: Failed to connect (exit code: $CURL_EXIT)"
              FAIL=1
            fi
          done
          
          if [ "$FAIL" -eq 1 ]; then
            echo "⚠️  Some endpoints exceeded TTFB threshold or failed - review for optimization"
          else
            echo "✅ All endpoints within TTFB threshold"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Check JavaScript syntax
        run: |
          node -e "const acorn = require('acorn'); const fs = require('fs'); try { acorn.parse(fs.readFileSync('assets/js/site.js', 'utf8'), { ecmaVersion: 2021, sourceType: 'script' }); console.log('✅ JavaScript syntax valid'); } catch(e) { console.error('❌', e.message); process.exit(1); }"

      - name: Verify translation files
        run: |
          php -r "json_decode(file_get_contents('lang/da.json'), true) or exit(1);"
          php -r "json_decode(file_get_contents('lang/en.json'), true) or exit(1);"
          echo "✅ Translation files valid JSON"

  lighthouse:
    name: "🔦 Lighthouse Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Start PHP server
        run: |
          php -S localhost:8000 &
          sleep 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Audit with Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:8000/index.php
            http://localhost:8000/demo.php
            http://localhost:8000/pricing.php
            http://localhost:8000/free-scan.php
          uploadArtifacts: true
          temporaryPublicStorage: true
          budgetPath: ./.lighthouserc.json

      - name: Check Lighthouse scores
        run: |
          echo "📊 Lighthouse audit complete"
          echo "View results in artifacts"
