---
name: Lighthouse Audit

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Lighthouse (treosh action)
        uses: treosh/lighthouse-ci-action@v9
        with:
          # Use SITE_URL secret if available, fallback to hardcoded
          urls: |
            ${{ secrets.SITE_URL || 'https://blackbox.codes' }}
          uploadArtifacts: true
          artifactName: lighthouse_results
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
