# ═══════════════════════════════════════════════════════════════
# CodeQL Security Analysis Workflow
# ═══════════════════════════════════════════════════════════════
#
# ⚠️  IMPORTANT: Dette workflow kræver "Code scanning"
#     Repository Settings → Security → Code security
#
# Sådan aktiverer du CodeQL scanning:
# 1. Gå til: Settings → Security → Code security
# 2. Klik "Set up" ved "Code scanning"
# 3. Vælg "GitHub Actions" som metode
# 4. Aktiver funktionen
# 5. Gem ændringerne
#
# Workflow Features:
# - PHP-kode scannes for sikkerhedssårbarheder
# - JavaScript scannes optionelt (via ENABLE_JS_CODEQL repository variable)
# - Resultater uploades til Security alerts
# - Kører ugentligt for nye sårbarheder
# - Graceful håndtering når code scanning ikke er aktiveret
#
# For JavaScript scanning, sæt repository variable:
# Settings > Variables > Repository variables > New variable
# Name: ENABLE_JS_CODEQL, Value: true
#
# Status: AKTIVERET med automatiske triggers
# Se: SECURITY_IMPLEMENTATION_SUMMARY.md for detaljer
#
# ═══════════════════════════════════════════════════════════════
---
name: "CodeQL"

on:
  # Automatiske triggers - aktiveret for Sprint 5 security scanning
  push:
    branches: [main]
    paths-ignore:
      - '.github/agents/**'
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '.github/agents/**'
      - 'docs/**'
      - '**/*.md'
  schedule:
    # Kør ugentligt søndag kl. 00:00 UTC
    - cron: '0 0 * * 0'

  # Manual workflow dispatch - allows testing without automatic triggers
  workflow_dispatch:
    inputs:
      enable_php:
        description: 'Run PHP analysis'
        required: false
        default: 'true'
      enable_js:
        description: 'Run JavaScript analysis'
        required: false
        default: 'false'

# Prevent multiple CodeQL runs on same branch
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-analysis:
    name: "🔐 PHP CodeQL Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Kører altid undtagen ved manual dispatch hvor enable_php er sat til false
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.enable_php == 'true' }}
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL for PHP
        id: init-codeql
        uses: github/codeql-action/init@v4
        continue-on-error: true
        with:
          languages: php

      - name: Check if CodeQL initialized successfully
        if: steps.init-codeql.outcome == 'failure'
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "⚠️  CodeQL initialization failed"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "This usually means Code Scanning is not enabled for this repository."
          echo ""
          echo "To enable Code Scanning:"
          echo "  1. Go to: https://github.com/${{ github.repository }}/settings/security_analysis"
          echo "  2. Find 'Code scanning' section"
          echo "  3. Click 'Set up' and choose 'GitHub Actions'"
          echo "  4. Re-run this workflow"
          echo ""
          echo "📋 See: SECURITY_IMPLEMENTATION_SUMMARY.md for details"
          echo "════════════════════════════════════════════════════════════════"
          # Exit with success to not fail the workflow - this is informational
          exit 0

      - name: Install PHP dependencies (composer)
        if: steps.init-codeql.outcome == 'success' && hashFiles('composer.json') != ''
        run: |
          composer install --no-interaction \
            --no-progress --no-suggest || true

      - name: Perform PHP CodeQL Analysis
        if: steps.init-codeql.outcome == 'success'
        uses: github/codeql-action/analyze@v4
        continue-on-error: true
        id: php-analysis
        with:
          category: "/language:php"

      - name: Analysis complete
        if: steps.init-codeql.outcome == 'success'
        run: |
          if [ "${{ steps.php-analysis.outcome }}" == "success" ]; then
            echo "✅ PHP CodeQL Analysis completed successfully"
            echo "   Check Security tab for any findings"
          else
            echo "⚠️  PHP CodeQL Analysis completed with warnings"
            echo "   Check workflow logs for details"
          fi

  js-analysis:
    name: "🔐 JavaScript CodeQL Analysis (Gated)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: php-analysis
    # Kører kun ved manual dispatch med enable_js=true, eller hvis ENABLE_JS_CODEQL variable er sat
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.enable_js == 'true') ||
      (github.event_name != 'workflow_dispatch' && vars.ENABLE_JS_CODEQL == 'true')
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL for JavaScript
        id: init-codeql-js
        uses: github/codeql-action/init@v4
        continue-on-error: true
        with:
          languages: javascript

      - name: Check if CodeQL initialized successfully
        if: steps.init-codeql-js.outcome == 'failure'
        run: |
          echo "⚠️  CodeQL initialization for JavaScript failed"
          echo "   See PHP Analysis job for instructions to enable Code Scanning"
          exit 0

      - name: Install JS dependencies (npm)
        if: steps.init-codeql-js.outcome == 'success' && hashFiles('package.json') != ''
        run: |
          npm ci --prefer-offline --no-audit \
            --progress=false || true

      - name: Perform JavaScript CodeQL Analysis
        if: steps.init-codeql-js.outcome == 'success'
        uses: github/codeql-action/analyze@v4
        continue-on-error: true
        id: js-analysis
        with:
          category: "/language:javascript"

      - name: Analysis complete
        if: steps.init-codeql-js.outcome == 'success'
        run: |
          if [ "${{ steps.js-analysis.outcome }}" == "success" ]; then
            echo "✅ JavaScript CodeQL Analysis completed successfully"
          else
            echo "⚠️  JavaScript CodeQL Analysis completed with warnings"
          fi
