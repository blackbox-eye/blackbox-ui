name: Lighthouse Audit

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Lighthouse token
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$LHCI_GITHUB_APP_TOKEN" ]; then
            echo "::error::Missing GitHub token for Lighthouse CI"
            exit 1
          fi
          echo "GitHub token available for Lighthouse CI."

      - name: Run Lighthouse (treosh action)
        uses: treosh/lighthouse-ci-action@v9
        with:
          # Using hardcoded URL for blackbox.codes
          # To use SITE_URL secret instead, uncomment the line below and comment out the hardcoded URL
          # urls: ${{ secrets.SITE_URL }}
          urls: |
            https://blackbox.codes
          uploadArtifacts: true
          artifactName: lighthouse-results
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
