# CI/CD workflow: deploy via FTP, ensure index.html removed before upload, and run smoke tests after upload.
# Secrets required (set in repo Settings > Secrets and variables > Actions):
# - FTP_HOST
# - FTP_USERNAME
# - FTP_PASSWORD
# - FTP_REMOTE_PATH  # path on the remote server where your site root (e.g. public_html) lives
#
# Quick secret rotation guide: To rotate these secrets, go to Settings > Secrets and variables > Actions,
# update the secret value and re-run the workflow. If using deploy keys or external services, revoke old credentials.
# Also double-check FTP_REMOTE_PATH after rotation if it changed.

name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_REMOTE_PATH: ${{ secrets.FTP_REMOTE_PATH }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Remove index.html on remote public_html
        run: |
          set -e
          # If FTP_REMOTE_PATH points directly to public_html adjust accordingly. Here we assume FTP_REMOTE_PATH is the site root.
          REMOTE_PUBLIC_HTML="$FTP_REMOTE_PATH/public_html"
          echo "Removing index.html from $REMOTE_PUBLIC_HTML on $FTP_HOST"
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" -e "cd $REMOTE_PUBLIC_HTML || exit 1; rm -f index.html; bye"
          LFTP_EXIT_CODE=$?
          if [ $LFTP_EXIT_CODE -ne 0 ]; then
            echo "lftp failed with exit code $LFTP_EXIT_CODE"
            exit $LFTP_EXIT_CODE
          fi
        shell: bash

      - name: Upload via FTP (SamKirkland/FTP-Deploy-Action)
        uses: SamKirkland/FTP-Deploy-Action@v4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}/public_html/
          local-dir: ./
          protocol: ftp

      - name: Smoke tests (curl)
        run: |
          set -euo pipefail
          echo "Checking https://blackbox.codes/"
          curl -sSfL --max-time 10 https://blackbox.codes/ | grep -q "Blackbox EYE"

          echo "Checking https://blackbox.codes/about.php"
          curl -sSfL --max-time 10 https://blackbox.codes/about.php | grep -q "Om Os"
        shell: bash