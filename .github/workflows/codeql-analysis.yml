# ═══════════════════════════════════════════════════════════════
# CodeQL Security Analysis Workflow
# ═══════════════════════════════════════════════════════════════
#
# ⚠️  IMPORTANT: Dette workflow kræver "Code scanning"
#     Repository Settings → Security → Code security
#
# Sådan aktiverer du CodeQL scanning:
# 1. Gå til: Settings → Security → Code security
# 2. Klik "Set up" ved "Code scanning"
# 3. Vælg "GitHub Actions" som metode
# 4. Aktiver funktionen
# 5. Gem ændringerne
#
# Efter aktivering:
# - Uncomment automatiske triggers (push, PR, schedule)
# - PHP-kode scannes for sikkerhedssårbarheder
# - JavaScript scannes optionelt (via secret)
# - Resultater uploades til Security alerts
# - Kører ugentligt for nye sårbarheder
#
# Status: KONFIGURERET (code scanning ikke aktiveret)
# Se: SECURITY_IMPLEMENTATION_SUMMARY.md for detaljer
#
# ═══════════════════════════════════════════════════════════════
---
name: "CodeQL"

on:
  # Disabled - uncomment when code scanning is enabled
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]
  # schedule:
  #   - cron: '0 0 * * 0'

  # Manual dispatch for testing
  workflow_dispatch:
    inputs:
      enable_php:
        description: 'Run PHP analysis'
        required: false
        default: 'true'
      enable_js:
        description: 'Run JavaScript analysis'
        required: false
        default: 'false'

jobs:
  php-analysis:
    name: PHP CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.enable_php == 'true'
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL for PHP
        uses: github/codeql-action/init@v2
        with:
          languages: php

      - name: Install PHP dependencies (composer)
        if: hashFiles('composer.json') != ''
        run: |
          composer install --no-interaction \
            --no-progress --no-suggest || true

      - name: Perform PHP CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        continue-on-error: true
        id: php-analysis

      - name: Check analysis status
        if: steps.php-analysis.outcome == 'failure'
        run: |
          echo "⚠️  CodeQL failed - code scanning not enabled"
          echo "📋 See SECURITY_IMPLEMENTATION_SUMMARY.md"
          URL="https://github.com/${{ github.repository }}"
          echo "🔗 Enable at: $URL/settings/security_analysis"
          exit 1

  js-analysis:
    name: JavaScript CodeQL Analysis (Gated)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: php-analysis
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.enable_js == 'true'
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL for JavaScript
        uses: github/codeql-action/init@v2
        with:
          languages: javascript

      - name: Install JS dependencies (npm)
        if: hashFiles('package.json') != ''
        run: |
          npm ci --prefer-offline --no-audit \
            --progress=false || true

      - name: Perform JavaScript CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        continue-on-error: true
        id: js-analysis

      - name: Check analysis status
        if: steps.js-analysis.outcome == 'failure'
        run: |
          echo "⚠️  CodeQL failed - code scanning not enabled"
          echo "📋 See SECURITY_IMPLEMENTATION_SUMMARY.md"
          URL="https://github.com/${{ github.repository }}"
          echo "🔗 Enable at: $URL/settings/security_analysis"
          exit 1
