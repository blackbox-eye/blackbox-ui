name: Lighthouse Audit

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Lighthouse (treosh action)
        uses: treosh/lighthouse-ci-action@v9
        with:
          # Using hardcoded URL for blackbox.codes
          # To use SITE_URL secret instead, uncomment the line below and comment out the hardcoded URL
          # urls: ${{ secrets.SITE_URL }}
          urls: |
            https://blackbox.codes
          uploadArtifacts: true
          artifactName: lighthouse_results
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
