name: CI & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ✅ Lint README
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python (kun for lint-eksempel)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lint README
        run: |
          if [ -f README.md ]; then
            echo "✅ README.md found!"
          else
            echo "❌ README.md missing!" >&2
            exit 1
          fi

  ftp-deploy:
    name: 🚀 FTP Deploy to public_html
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}
