---
name: Sprint 5 Smoke Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse CI (Assertions)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm1 libatk-bridge2.0-0 libgtk-3-0

      - name: Create output directory
        run: mkdir -p lighthouse-results

      - name: Run Lighthouse CI (assertions only)
        env:
          SITE_URL: ${{ secrets.SITE_URL || 'https://blackbox.codes' }}
        run: |
          echo "🔍 Running Lighthouse CI with assertions..."
          echo "   Target URL: $SITE_URL"

          set +e
          npx -y @lhci/cli@0.13.x autorun \
            --collect.url="$SITE_URL" \
            --collect.numberOfRuns=1 \
            --assert.assertMatrix="./.lighthouseci/assertions.json" \
            --upload.target=filesystem \
            --upload.outputDir=./lighthouse-results
          LHCI_EXIT=$?
          set -e

          if [ $LHCI_EXIT -eq 0 ]; then
            echo "✅ Lighthouse CI assertions passed."
          elif [ $LHCI_EXIT -eq 1 ]; then
            echo "⚠️ Lighthouse CI assertions failed (exit code 1)."
            echo "   This is expected if performance/accessibility thresholds are not met."
          else
            echo "❌ Lighthouse CI encountered an error (exit code $LHCI_EXIT)."
            exit $LHCI_EXIT
          fi

      - name: Ensure artifact directory is not empty
        run: |
          echo "Checking lighthouse-results directory..."
          if [ ! -d "lighthouse-results" ]; then
            echo "Directory missing. Creating with placeholder."
            mkdir -p lighthouse-results
            echo '{"placeholder": true, "reason": "directory_missing", "timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"}' \
              > lighthouse-results/placeholder.json
          elif [ -z "$(ls -A lighthouse-results)" ]; then
            echo "Directory empty. Adding placeholder."
            echo '{"placeholder": true, "reason": "directory_empty", "timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"}' \
              > lighthouse-results/placeholder.json
          else
            echo "Directory contains files."
          fi
          echo "Contents:"
          ls -la lighthouse-results/

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        with:
          name: lhci-results
          path: lighthouse-results/
          retention-days: 14
          if-no-files-found: warn
