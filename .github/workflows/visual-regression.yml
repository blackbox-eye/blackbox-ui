# ═══════════════════════════════════════════════════════════════
# Visual Regression Testing Workflow
# ═══════════════════════════════════════════════════════════════
#
# Kører Playwright visuelle tests for UI ændringer.
# Triggeres kun ved relevante fil-ændringer (PHP, assets, includes).
# Ignorerer docs, agents og markdown-filer for at reducere støj.
#
# SSO Health Check: Non-blocking step that validates local SSO stub.
# External TS24 DNS failures will NOT fail this workflow.
#
# ═══════════════════════════════════════════════════════════════
---
name: Visual Regression

on:
  push:
    branches: [main]
    # Use paths-ignore only (paths + paths-ignore combo is invalid)
    paths-ignore:
      - '.github/agents/**'
      - 'docs/**'
      - '**/*.md'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.well-known/**'
  pull_request:
    branches: [main]
    # Use paths-ignore only (paths + paths-ignore combo is invalid)
    paths-ignore:
      - '.github/agents/**'
      - 'docs/**'
      - '**/*.md'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.well-known/**'
  workflow_dispatch:

# Prevent multiple runs on same branch - auto-cancel old runs
concurrency:
  group: visual-regression-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions for security
permissions:
  contents: read

jobs:
  visual:
    name: "🎨 Visual Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Validate GitHub token
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "::error::Missing GITHUB_TOKEN for Playwright reporting"
            exit 1
          fi
          echo "GitHub token available."

      - name: Create CI database stub
        run: |
          cat > db.php << 'EOF'
          <?php
          // CI stub - provides null PDO connection for testing
          // Pages should handle $pdo being null gracefully
          $pdo = null;
          EOF

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # ═══════════════════════════════════════════════════════════════
      # SSO Health Check (Non-blocking)
      # ═══════════════════════════════════════════════════════════════
      # This step validates the local SSO stub. It will NOT fail the
      # workflow if external TS24 DNS is unavailable (expected in CI).
      # See docs/sso_healthcheck.md for details on blocking vs non-blocking.
      # ═══════════════════════════════════════════════════════════════
      - name: Start PHP servers for SSO health check
        run: |
          echo "Starting GDI server on port 8000..."
          php -S 127.0.0.1:8000 > /tmp/php-8000.log 2>&1 &
          echo "Starting TS24 stub server on port 8091..."
          php -S 127.0.0.1:8091 > /tmp/php-8091.log 2>&1 &
          sleep 2
          echo "PHP servers started."

      - name: Run SSO health check (non-blocking)
        id: sso_health
        continue-on-error: true
        env:
          CI: 'true'
        run: |
          echo "🔍 Running SSO health check..."
          echo ""
          if npm run sso:health; then
            echo "✅ SSO health check passed"
            echo "sso_status=passed" >> $GITHUB_OUTPUT
          else
            echo "⚠️ SSO health check failed (non-blocking in CI)"
            echo "   This may indicate TS24 external DNS is unavailable."
            echo "   See docs/ts24_dns_status_*.md for current DNS status."
            echo "sso_status=warning" >> $GITHUB_OUTPUT
          fi

      - name: Report SSO health status
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "SSO Health Check Summary"
          echo "═══════════════════════════════════════════════════════════════"
          if [ "${{ steps.sso_health.outcome }}" == "success" ]; then
            echo "✅ SSO health check: PASSED"
          else
            echo "⚠️ SSO health check: WARNING (non-blocking)"
            echo ""
            echo "This is expected if TS24 external DNS (intel24.tstransport.app)"
            echo "is unavailable. The local stub was tested, but external"
            echo "connectivity could not be verified."
            echo ""
            echo "📄 For details, see: docs/ts24_dns_status_*.md"
          fi
          echo "═══════════════════════════════════════════════════════════════"

      - name: Run visual tests
        run: npm run test:ci

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-screenshots
          path: artifacts/**
          if-no-files-found: warn
