<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <pattern id="hexagons" width="50" height="43.4" patternUnits="userSpaceOnUse" patternTransform="scale(1.5)">
      <!-- Honeycomb/hexagon pattern for dark theme -->
      <polygon
        points="25,0 50,14.4 50,43.4 25,57.8 0,43.4 0,14.4"
        fill="none"
        stroke="rgba(255,255,255,0.03)"
        stroke-width="0.5"
      />
      <polygon
        points="75,0 100,14.4 100,43.4 75,57.8 50,43.4 50,14.4"
        fill="none"
        stroke="rgba(255,255,255,0.03)"
        stroke-width="0.5"
      />
      <polygon
        points="25,43.4 50,57.8 50,86.8 25,101.2 0,86.8 0,57.8"
        fill="none"
        stroke="rgba(255,255,255,0.03)"
        stroke-width="0.5"
      />
    </pattern>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1217;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0D1A20;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1217;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="url(#darkGradient)"/>
  <rect width="100" height="100" fill="url(#hexagons)"/>
  <!-- Subtle glow spots -->
  <circle cx="20" cy="30" r="40" fill="rgba(26,115,232,0.02)"/>
  <circle cx="80" cy="70" r="35" fill="rgba(233,69,96,0.015)"/>
</svg>
