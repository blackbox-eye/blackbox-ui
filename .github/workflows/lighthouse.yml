# ═══════════════════════════════════════════════════════════════
# Lighthouse Audit Workflow
# ═══════════════════════════════════════════════════════════════
#
# Kører performance og accessibility audit mod live site.
# Bruger treosh/lighthouse-ci-action for automatisk rapportering.
#
# ═══════════════════════════════════════════════════════════════
---
name: Lighthouse Audit

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/agents/**'
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

# Minimal permissions for security
permissions:
  contents: read

jobs:
  lighthouse:
    name: "🔦 Lighthouse CI"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate Lighthouse token
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$LHCI_GITHUB_APP_TOKEN" ]; then
            echo "::error::Missing GitHub token for Lighthouse CI"
            exit 1
          fi
          echo "GitHub token available for Lighthouse CI."

      - name: Run Lighthouse (treosh action)
        uses: treosh/lighthouse-ci-action@v12
        with:
          # Target URL for lighthouse audit
          urls: |
            https://blackbox.codes
          uploadArtifacts: true
          artifactName: lighthouse-results
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
