# ═══════════════════════════════════════════════════════════════════════════════
# CodeQL Security Analysis Workflow
# ═══════════════════════════════════════════════════════════════════════════════
#
# ⚠️  IMPORTANT: Dette workflow kræver at "Code scanning" er aktiveret i GitHub
#     Repository Settings → Security → Code security and analysis
#
# Sådan aktiverer du CodeQL scanning:
# 1. Gå til: https://github.com/AlphaAcces/ALPHA-Interface-GUI/settings/security_analysis
# 2. Klik "Set up" ved siden af "Code scanning"
# 3. Vælg "GitHub Actions" som analyse-metode
# 4. Aktiver funktionen
# 5. Gem ændringerne
#
# Efter aktivering skal du uncommente de automatiske triggers herunder (push, PR, schedule)
# for at få automatisk scanning ved hver kode-ændring.
#
# Når aktiveret, vil dette workflow:
# - Scanne PHP-kode for sikkerhedssårbarheder (altid aktiv)
# - Optionelt scanne JavaScript (når ENABLE_JS_CODEQL secret er sat til 'true')
# - Uploade resultater til Security → Code scanning alerts
# - Køre ugentligt for at opdage nye sårbarheder
#
# Nuværende status: KONFIGURERET men code scanning ikke aktiveret
# Se: SECURITY_IMPLEMENTATION_SUMMARY.md for detaljerede instruktioner
#
# ═══════════════════════════════════════════════════════════════════════════════

name: "CodeQL"

on:
  # Automatic triggers - aktiveret for Sprint 5 security scanning
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Kør ugentligt søndag kl. 00:00 UTC
    - cron: '0 0 * * 0'
  
  # Manual workflow dispatch - allows testing without automatic triggers
  workflow_dispatch:
    inputs:
      enable_php:
        description: 'Run PHP analysis'
        required: false
        default: 'true'
      enable_js:
        description: 'Run JavaScript analysis'
        required: false
        default: 'false'

jobs:
  php-analysis:
    name: PHP CodeQL Analysis
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.enable_php == 'true' }}
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL for PHP
        uses: github/codeql-action/init@v2
        with:
          languages: php

      - name: Install PHP dependencies (composer)
        if: hashFiles('composer.json') != ''
        run: |
          composer install --no-interaction --no-progress --no-suggest || true

      - name: Perform PHP CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        continue-on-error: true
        id: php-analysis
        
      - name: Check analysis status
        if: steps.php-analysis.outcome == 'failure'
        run: |
          echo "⚠️  CodeQL analysis failed - likely because code scanning is not enabled"
          echo "📋 See SECURITY_IMPLEMENTATION_SUMMARY.md for setup instructions"
          echo "🔗 Enable at: https://github.com/${{ github.repository }}/settings/security_analysis"
          exit 1

  js-analysis:
    name: JavaScript CodeQL Analysis (Gated)
    runs-on: ubuntu-latest
    needs: php-analysis
    if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.enable_js == 'true') || (github.event_name != 'workflow_dispatch' && vars.ENABLE_JS_CODEQL == 'true') }}
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL for JavaScript
        uses: github/codeql-action/init@v2
        with:
          languages: javascript

      - name: Install JS dependencies (npm)
        if: hashFiles('package.json') != ''
        run: |
          npm ci --prefer-offline --no-audit --progress=false || true

      - name: Perform JavaScript CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        continue-on-error: true
        id: js-analysis
        
      - name: Check analysis status
        if: steps.js-analysis.outcome == 'failure'
        run: |
          echo "⚠️  CodeQL analysis failed - likely because code scanning is not enabled"
          echo "📋 See SECURITY_IMPLEMENTATION_SUMMARY.md for setup instructions"
          echo "🔗 Enable at: https://github.com/${{ github.repository }}/settings/security_analysis"
          exit 1
