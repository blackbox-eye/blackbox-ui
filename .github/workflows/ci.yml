name: CI & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    name: "✅ Lint README"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Sæt Python op (fjern hvis du ikke bruger Python)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Eksempel på Node‑dependencies (udkommenteret – aktiver hvis nødvendigt)
      # - name: Install dependencies
      #   run: npm ci

      - name: Lint README
        run: |
          if [ -f README.md ]; then
            echo "✅ README.md found!"
          else
            echo "❌ README.md missing!" >&2
            exit 1
          fi

  ftp-deploy:
    name: "🚀 FTP Deploy to public_html/"
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}