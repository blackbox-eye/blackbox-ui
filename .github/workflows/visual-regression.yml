# ═══════════════════════════════════════════════════════════════
# Visual Regression Testing Workflow
# ═══════════════════════════════════════════════════════════════
#
# Kører Playwright visuelle tests for UI ændringer.
# Triggeres kun ved relevante fil-ændringer (PHP, assets, includes).
# Ignorerer docs, agents og markdown-filer for at reducere støj.
#
# ═══════════════════════════════════════════════════════════════
---
name: Visual Regression

# Note: GitHub Actions supports EITHER paths OR paths-ignore, not both.
# We use paths-ignore since markdown/docs changes should not trigger visual tests.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/agents/**'
      - 'LICENSE'
      - 'CHANGELOG.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/agents/**'
      - 'LICENSE'
      - 'CHANGELOG.md'
  workflow_dispatch:

# Prevent multiple runs on same branch - auto-cancel old runs
concurrency:
  group: visual-regression-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions for security
permissions:
  contents: read

jobs:
  visual:
    name: "🎨 Visual Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Validate GitHub token
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "::error::Missing GITHUB_TOKEN for Playwright reporting"
            exit 1
          fi
          echo "GitHub token available."

      - name: Create CI database stub
        run: |
          cat > db.php << 'EOF'
          <?php
          // CI stub - provides null PDO connection for testing
          // Pages should handle $pdo being null gracefully
          $pdo = null;
          EOF

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run visual tests
        run: npm run test:ci

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-screenshots
          path: artifacts/**
          if-no-files-found: warn
