# ═══════════════════════════════════════════════════════════════
# Blog Intel Weekly - Automated Cyber Intelligence Collection
# ═══════════════════════════════════════════════════════════════
#
# This workflow collects cybersecurity intelligence from official feeds
# and generates blog.php data files automatically.
#
# Pipeline Steps:
# A) Collect - Parse RSS/Atom feeds from configured sources
# B) Normalize - Convert to standard schema
# C) Dedupe - Remove duplicates by URL + title hash
# D) Enrich - Add tags, risk levels, metadata
# E) Output - Generate posts.json + latest.json
# F) PR - Create pull request for review
#
# Compliance:
# - Respects robots.txt (RSS/official feeds only)
# - No paywall scraping (metadata + RSS summaries only)
# - Copyright-safe (short excerpts + source links)
# - Attribution required (source name + URL)
# ═══════════════════════════════════════════════════════════════
---
name: Blog Intel Weekly

on:
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no PR creation)'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  collect-intel:
    name: "📰 Collect Cyber Intel"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          echo "📦 Installing feed parser dependencies..."
          npm install --no-save rss-parser node-fetch@2

      - name: Collect RSS feeds
        id: collect
        run: |
          echo "🔍 Collecting intel from RSS/Atom feeds..."
          node scripts/blog-intel/collect-feeds.js
          echo "collected_count=$(cat /tmp/intel_count.txt 2>/dev/null || echo 0)" >> $GITHUB_OUTPUT

      - name: Normalize data
        run: |
          echo "🔧 Normalizing collected data..."
          node scripts/blog-intel/normalize.js

      - name: Deduplicate
        run: |
          echo "🔍 Removing duplicates..."
          node scripts/blog-intel/dedupe.js

      - name: Enrich metadata
        run: |
          echo "✨ Enriching with tags and risk levels..."
          node scripts/blog-intel/enrich.js

      - name: Generate outputs
        run: |
          echo "📝 Generating posts.json and latest.json..."
          node scripts/blog-intel/generate-outputs.js

      - name: Validate generated files
        run: |
          echo "✅ Validating generated JSON..."
          node -e "
            const posts = require('./data/blog/posts.json');
            const latest = require('./data/blog/latest.json');
            console.log('Posts:', posts.posts.length);
            console.log('Latest:', latest.posts.length);
            if (posts.posts.length === 0) {
              console.warn('⚠️  No posts generated');
            }
          "

      - name: Create Pull Request
        if: github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(blog): Weekly intel update - ${{ steps.collect.outputs.collected_count }} new posts"
          title: "📰 Weekly Intel Update - ${{ steps.collect.outputs.collected_count }} posts"
          body: |
            ## 📰 Weekly Cyber Intelligence Update
            
            Automated collection from RSS/official feeds.
            
            ### Statistics
            - **New posts**: ${{ steps.collect.outputs.collected_count }}
            - **Generated**: ${{ github.run_id }}
            - **Pipeline version**: 1.0.0
            
            ### Compliance
            ✅ RSS/Atom feeds only (no scraping)
            ✅ Respects robots.txt
            ✅ Short excerpts (max 240 chars)
            ✅ Source attribution + direct links
            
            ### Review Checklist
            - [ ] Post titles are accurate
            - [ ] Sources are properly attributed
            - [ ] Risk levels seem appropriate
            - [ ] No duplicate posts
            - [ ] Excerpts are under 240 characters
            
            **Auto-generated by workflow:** ${{ github.workflow }}
          branch: blog-intel-weekly-${{ github.run_number }}
          delete-branch: true
          labels: |
            blog
            automation
            intel

      - name: Summary
        run: |
          echo "════════════════════════════════════════"
          echo "📰 Blog Intel Collection Complete"
          echo "════════════════════════════════════════"
          echo "Collected: ${{ steps.collect.outputs.collected_count }} posts"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "════════════════════════════════════════"
