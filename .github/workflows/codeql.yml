# ═══════════════════════════════════════════════════════════════════════════════
# CodeQL Security Scanning Workflow
# ═══════════════════════════════════════════════════════════════════════════════
# 
# This workflow performs automated security vulnerability scanning using CodeQL.
# It analyzes JavaScript and PHP code for common security issues including:
# - SQL Injection
# - Cross-Site Scripting (XSS)
# - Command Injection
# - Path Traversal
# - Insecure Cryptography
# - Authentication/Authorization Issues
# - And many more...
#
# Scan Results: Security > Code scanning alerts
# ═══════════════════════════════════════════════════════════════════════════════

name: "CodeQL Security Scan"

on:
  push:
    branches: [ main, develop, copilot/* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run weekly on Mondays at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

# Minimal permissions for security best practices
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze Code Security
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        # Scan multiple languages
        language: [ 'javascript', 'python' ]
        # Note: PHP analysis is done through 'python' queries that cover PHP patterns

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Use security-extended query suite for comprehensive scanning
          queries: security-extended
          # Add custom queries path if available
          # config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"
          # Upload SARIF results for review
          upload: true
          # Fail workflow if critical vulnerabilities found (optional - commented out for now)
          # fail-on: critical

      - name: Security scan summary
        if: always()
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "🔒 CodeQL Security Scan Completed"
          echo "════════════════════════════════════════════════════════════"
          echo "Language: ${{ matrix.language }}"
          echo "Query Suite: security-extended"
          echo "Results: Check Security > Code scanning alerts"
          echo "════════════════════════════════════════════════════════════"
