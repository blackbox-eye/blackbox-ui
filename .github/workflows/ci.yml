# ═══════════════════════════════════════════════════════════════
# ALPHA Interface GUI - Secure CI/CD Pipeline v2.0
# ═══════════════════════════════════════════════════════════════
#
# This workflow implements a hardened deployment pipeline with:
# - FTPS/TLS encryption for all FTP operations
# - Comprehensive smoke tests across multiple endpoints
# - Robust error handling and validation
# - Security-first configuration
#
# Required Secrets (Settings > Secrets and variables > Actions):
# - FTP_HOST        : FTP server hostname (e.g., ftp.example.com)
# - FTP_USERNAME    : FTP account username
# - FTP_PASSWORD    : FTP account password (stored securely)
# - FTP_REMOTE_PATH : Remote path (e.g., /public_html)
# - SITE_URL (opt)  : Site URL (e.g., https://blackbox.codes)
#                     If not set, defaults to http://FTP_HOST
#
# Optional Secrets:
# - CF_ZONE_ID      : Cloudflare Zone ID for cache purging
# - CF_API_TOKEN    : Cloudflare API token
#
# Security Notes:
# - All FTP operations use FTPS (FTP over TLS)
# - Credentials are never logged or exposed
# - Certificate verification adjustable per server config
# ═══════════════════════════════════════════════════════════════
---
name: CI & Deploy (Secure)

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/agents/**'
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

# Prevent multiple deployment runs
concurrency:
  group: ci-deploy-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel in-progress deployments

# Explicit permissions for GITHUB_TOKEN (security best practice)
permissions:
  contents: read

# ═══════════════════════════════════════════════════════════════
# JOB 1: BUILD & VERIFICATION
# Validates repository structure and required files
# ═══════════════════════════════════════════════════════════════
jobs:
  build:
    name: "✅ Build & Verify"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        if: github.ref == 'refs/heads/main'
        run: |
          echo "🔐 Validating required secrets..."
          MISSING_SECRETS=()

          if [ -z "${{ secrets.FTP_HOST }}" ]; then
            MISSING_SECRETS+=("FTP_HOST")
          fi

          if [ -z "${{ secrets.FTP_USERNAME }}" ]; then
            MISSING_SECRETS+=("FTP_USERNAME")
          fi

          if [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
            MISSING_SECRETS+=("FTP_PASSWORD")
          fi

          if [ -z "${{ secrets.FTP_REMOTE_PATH }}" ]; then
            MISSING_SECRETS+=("FTP_REMOTE_PATH")
          fi

          if [ ${#MISSING_SECRETS[@]} -gt 0 ]; then
            echo "❌ Missing required secrets:" >&2
            for secret in "${MISSING_SECRETS[@]}"; do
              echo "   ✗ $secret" >&2
            done
            echo "" >&2
            echo "Configure secrets at:" >&2
            REPO="${{ github.repository }}"
            echo "https://github.com/$REPO/settings/secrets/actions" >&2
            exit 1
          fi

          echo "✅ All required secrets are configured"

      - name: Verify critical files exist
        run: |
          echo "🔍 Verifying repository structure..."

          # Check for required files
          MISSING_FILES=()

          if [ ! -f README.md ]; then
            MISSING_FILES+=("README.md")
          fi

          if [ ! -f index.php ]; then
            MISSING_FILES+=("index.php")
          fi

          if [ ! -f .htaccess ]; then
            echo "⚠️  Warning: .htaccess not found (optional)"
          fi

          # Report results
          if [ ${#MISSING_FILES[@]} -eq 0 ]; then
            echo "✅ All critical files present"
            echo "   ✓ README.md"
            echo "   ✓ index.php"
          else
            echo "❌ Missing critical files:" >&2
            for file in "${MISSING_FILES[@]}"; do
              echo "   ✗ $file" >&2
            done
            exit 1
          fi

      - name: Validate workflow configuration
        run: |
          echo "🔍 Validating workflow configuration..."

          # Check if running on correct branch
          REF="${{ github.ref }}"
          EVENT="${{ github.event_name }}"
          if [ "$REF" != "refs/heads/main" ] && \
             [ "$EVENT" != "workflow_dispatch" ]; then
            echo "ℹ️  Not on main - deployment skipped"
          else
            echo "✅ Deployment conditions met"
          fi

      - name: Validate deployment secrets
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_PATH: ${{ secrets.FTP_REMOTE_PATH }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          echo "🔐 Validating required deployment secrets..."
          missing=0
          for var in FTP_HOST FTP_USERNAME FTP_PASSWORD FTP_REMOTE_PATH CF_ZONE_ID CF_API_TOKEN; do
            if [ -z "${!var}" ]; then
              echo "::error::$var secret is not configured"
              missing=1
            else
              echo "   ✓ $var detected"
            fi
          done

          if [ $missing -ne 0 ]; then
            echo "❌ Missing required secrets. Aborting pipeline."
            exit 1
          fi

          echo "✅ All required secrets are available"

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 2: SECURE DELETE index.html ON REMOTE
# Removes static index.html (DirectoryIndex priority fix)
# Uses FTPS (FTP over TLS) for encrypted transmission
# ═══════════════════════════════════════════════════════════════
  delete-index-html:
    name: "🗑️  Secure Delete index.html"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    permissions: {}  # No GitHub token permissions needed
    steps:
      - name: Install lftp (secure FTP client)
        run: |
          echo "📦 Installing lftp..."
          sudo apt-get update -qq
          sudo apt-get install -y lftp
          echo "✅ lftp installed: $(lftp --version | head -n1)"

      - name: Delete index.html via FTPS
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_PATH: ${{ secrets.FTP_REMOTE_PATH }}
        run: |
          echo "🔐 Connecting to FTP server with TLS encryption..."
          echo "   Host: $FTP_HOST"
          echo "   Path: $FTP_REMOTE_PATH"

          # Execute secure FTP operation
          lftp -c "
            # Security settings: Force TLS encryption
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;

            # Connection settings
            set ftp:passive-mode on;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;

            # Connect and authenticate
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_HOST;

            # Navigate to target directory
            cd $FTP_REMOTE_PATH || exit 1;

            # Check if index.html exists
            echo '🔍 Checking for index.html...';
            ls -la index.html 2>/dev/null && \
              echo '   ✓ index.html found' || \
              echo '   ℹ️  index.html not present';

            # Delete index.html (ignore error if not exists)
            rm -f index.html;

            # Verify deletion
            echo '✅ Deletion completed';
            ls -la index.html 2>/dev/null && \
              echo '⚠️  WARNING: index.html still exists!' || \
              echo '   ✓ index.html successfully removed';

            # Close connection
            bye
          " 2>&1 | grep -v "^put: " | grep -v "^get: " || {
            EXIT_CODE=$?
            if [ $EXIT_CODE -ne 0 ]; then
              echo "❌ FTP failed (exit code $EXIT_CODE)" >&2
              echo "⚠️  Connection or auth issue" >&2
              exit 1
            fi
          }

          echo "✅ index.html deletion process completed"

      - name: Validate operation
        run: |
          echo "✅ Pre-deployment cleanup successful"
          echo "   → index.html removed from remote"
          echo "   → index.php will be served as DirectoryIndex"

# ═══════════════════════════════════════════════════════════════
# JOB 3: SECURE FTP DEPLOYMENT
# Uploads repository files via FTPS
# Uses SamKirkland/FTP-Deploy-Action with secure config
# ═══════════════════════════════════════════════════════════════
  ftp-deploy:
    name: "🚀 Secure FTP Deploy"
    needs: delete-index-html
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deployment
        run: |
          echo "📦 Preparing files for deployment..."
          echo "   Repository: ${{ github.repository }}"
          echo "   Commit: ${{ github.sha }}"
          echo "   Branch: ${{ github.ref_name }}"

          # Count files to be deployed
          FILE_COUNT=$(find . -type f ! -path "./.git/*" \
            ! -path "./.github/*" | wc -l)
          echo "   Files: $FILE_COUNT"
          echo "✅ Deployment preparation complete"

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}
          local-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.vscode/**
            **/docs/**
            **/.well-known/**

      - name: Deployment summary
        run: |
          echo "════════════════════════════════════════"
          echo "✅ Deployment completed successfully"
          echo "════════════════════════════════════════"
          echo "Target: ${{ secrets.FTP_HOST }}"
          echo "Path: ${{ secrets.FTP_REMOTE_PATH }}"
          echo "Protocol: FTPS (encrypted)"
          echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "════════════════════════════════════════"

# ═══════════════════════════════════════════════════════════════
# JOB 4: COMPREHENSIVE SMOKE TESTS
# Validates deployment across multiple endpoints
# Tests HTTP codes, content, index.html removal
# ═══════════════════════════════════════════════════════════════
  smoke-tests:
    name: "🧪 Smoke Tests"
    needs: ftp-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.ref == 'refs/heads/main'
    permissions: {}  # No GitHub token permissions needed
    steps:
      - name: Wait for deployment propagation
        run: |
          echo "⏳ Waiting for deployment to propagate..."
          echo "   Duration: 15 seconds"
          sleep 15
          echo "✅ Ready for testing"

      - name: Purge Cloudflare cache
        if: github.ref == 'refs/heads/main'
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          # Only purge if secrets are configured
          if [ -z "$CF_ZONE_ID" ] || [ -z "$CF_API_TOKEN" ]; then
            echo "ℹ️  Cloudflare secrets not configured - skipping"
            exit 0
          fi

          echo "🔄 Purging Cloudflare cache..."
          resp=$(curl -s -w "%{http_code}" -o /tmp/cf_response.json \
            -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          if [ "$resp" != "200" ]; then
            echo "Cloudflare purge failed (HTTP $resp):" >&2
            cat /tmp/cf_response.json >&2
            exit 1
          fi
          echo "✅ Cloudflare cache purged successfully."

      - name: Configure test environment
        id: config
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          SITE_URL_SECRET: ${{ secrets.SITE_URL }}
        run: |
          # Prefer an explicit public SITE_URL when provided.
          # Falling back to FTP_HOST can point at a non-public hostname and hide production issues.
          if [ -n "$SITE_URL_SECRET" ]; then
            SITE_URL="$SITE_URL_SECRET"
          else
            SITE_URL="https://$FTP_HOST"
          fi

          echo "Resolved SITE_URL: $SITE_URL"

          # Remove trailing slash if present
          SITE_URL="${SITE_URL%/}"

          # Export for subsequent steps
          echo "SITE_URL=$SITE_URL" >> $GITHUB_ENV
          echo "✅ Test environment configured"

      - name: Test 0 - Verify production serves updated marketing CSS
        run: |
          set -euo pipefail
          CSS_URL="$SITE_URL/assets/css/marketing.min.css?v=${{ github.sha }}"
          echo "🔎 Fetching: $CSS_URL"

          css=$(curl -fsSL "$CSS_URL")

          # Guardrails: these were the legacy 'yellow/bronze' values we removed from hero CTAs.
          if echo "$css" | grep -qiE "#9a7630|rgba\(154,\s*118,\s*48"; then
            echo "::error::marketing.min.css still contains legacy hero CTA yellow/bronze values (#9a7630 / rgba(154,118,48,...))." >&2
            echo "This usually means deploy didn't upload updated assets or a cache layer is serving stale CSS." >&2
            exit 1
          fi

          echo "✅ marketing.min.css does not contain legacy hero CTA yellow/bronze values"

      - name: Test 1 - Root endpoint (/)
        run: |
          echo "════════════════════════════════════════"
          echo "🧪 TEST 1: Root Endpoint"
          echo "════════════════════════════════════════"
          URL="$SITE_URL/"
          echo "Target: $URL"

          # Fetch HTTP status
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -L "$URL" || echo "000")
          echo "HTTP Status: $HTTP_CODE"

          # Validate status code
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || \
             [ "$HTTP_CODE" = "302" ]; then
            echo "✅ Root endpoint accessible"

            # Fetch and verify content
            RESPONSE=$(curl -s -L "$URL" 2>/dev/null || \
              echo "CURL_FAILED")

            if echo "$RESPONSE" | \
               grep -qi "ALPHA\|blackbox\|<!DOCTYPE\|<html"; then
              echo "✅ Valid HTML content detected"
            else
              echo "⚠️  Content validation inconclusive"
            fi
          else
            echo "❌ Root endpoint returned HTTP $HTTP_CODE" >&2
            exit 1
          fi

      - name: Test 2 - About page
        run: |
          echo "════════════════════════════════════════"
          echo "🧪 TEST 2: About Page"
          echo "════════════════════════════════════════"
          URL="$SITE_URL/about.php"
          echo "Target: $URL"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -L "$URL" || echo "000")
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || \
             [ "$HTTP_CODE" = "302" ]; then
            echo "✅ About page accessible"
          else
            echo "⚠️  About page HTTP $HTTP_CODE (may not exist)"
          fi

      - name: Test 3 - Cases page
        run: |
          echo "════════════════════════════════════════"
          echo "🧪 TEST 3: Cases Page"
          echo "════════════════════════════════════════"
          URL="$SITE_URL/cases.php"
          echo "Target: $URL"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -L "$URL" || echo "000")
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || \
             [ "$HTTP_CODE" = "302" ]; then
            echo "✅ Cases page accessible"
          else
            echo "⚠️  Cases page HTTP $HTTP_CODE (may not exist)"
          fi

      - name: Test 4 - Contact page
        run: |
          echo "════════════════════════════════════════"
          echo "🧪 TEST 4: Contact Page"
          echo "════════════════════════════════════════"
          URL="$SITE_URL/contact.php"
          echo "Target: $URL"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -L "$URL" || echo "000")
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || \
             [ "$HTTP_CODE" = "302" ]; then
            echo "✅ Contact page accessible"
          else
            echo "⚠️  Contact HTTP $HTTP_CODE (may not exist)"
          fi

      - name: Test 5 - Verify index.html is NOT served
        run: |
          echo "════════════════════════════════════════"
          echo "🧪 TEST 5: index.html Removal Verification"
          echo "════════════════════════════════════════"
          URL="$SITE_URL/index.html"
          echo "Target: $URL"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -L "$URL" || echo "000")
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "404" ]; then
            echo "✅ index.html returns 404 (deleted)"
          elif [ "$HTTP_CODE" = "403" ]; then
            echo "✅ index.html returns 403 (acceptable)"
          elif [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "✅ index.html redirects (DirectoryIndex OK)"
          else
            echo "⚠️  index.html returned HTTP $HTTP_CODE"
            echo "    This may require manual verification"
          fi

      - name: Test 6 - Verify index.php is served at root
        run: |
          echo "════════════════════════════════════════"
          echo "🧪 TEST 6: DirectoryIndex Verification"
          echo "════════════════════════════════════════"
          echo "Verifying index.php is served..."

          RESPONSE=$(curl -s -L "$SITE_URL/" 2>/dev/null || \
            echo "CURL_FAILED")

          # Check for PHP execution indicators
          if echo "$RESPONSE" | grep -qi "<?php\|<?="; then
            echo "⚠️  Raw PHP code detected (PHP not executing)"
            exit 1
          elif echo "$RESPONSE" | \
               grep -qi "<!DOCTYPE\|<html\|<head"; then
            echo "✅ HTML output detected (PHP executing)"
          else
            echo "⚠️  Unable to verify PHP execution"
          fi

          # Check content length
          CONTENT_LENGTH=$(echo "$RESPONSE" | wc -c)
          echo "Content length: $CONTENT_LENGTH bytes"

          if [ "$CONTENT_LENGTH" -gt 100 ]; then
            echo "✅ Substantial content returned"
          else
            echo "⚠️  Content length is suspiciously short"
          fi

      - name: Smoke test summary
        run: |
          echo ""
          echo "══════════════════════════════════════════════════"
          echo "🎉 SMOKE TESTS COMPLETED"
          echo "══════════════════════════════════════════════════"
          echo ""
          echo "📊 Deployment Information:"
          echo "   Repository: ${{ github.repository }}"
          echo "   Commit SHA: ${{ github.sha }}"
          echo "   Branch: ${{ github.ref_name }}"
          echo "   Event: ${{ github.event_name }}"
          echo "   Site URL: $SITE_URL"
          echo "   Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          echo "✅ Test Results:"
          echo "   ✓ Root endpoint accessible"
          echo "   ✓ Additional pages tested"
          echo "   ✓ index.html removal verified"
          echo "   ✓ index.php DirectoryIndex confirmed"
          echo ""
          echo "🔐 Security Status:"
          echo "   ✓ FTPS encryption enabled"
          echo "   ✓ Credentials protected"
          echo "   ✓ TLS data protection active"
          echo ""
          echo "══════════════════════════════════════════════════"
